services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      SERVE_STATIC: "0"
      # Must match volume mount; default app/db.py used DATABASE_URL only and ignored DATABASE_PATH.
      DATABASE_URL: sqlite+aiosqlite:////data/contacts.db
    volumes:
    - ./contacts.db:/data/contacts.db
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
